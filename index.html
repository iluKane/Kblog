<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="“明明是最懒、家务能力最差的一代女人，却整天说自己是“免费保姆”；明明是忠贞度最低的一代女人，却整天说真心被辜负；明明是婚前同居随意怀孕人流率最高的一代女人，却整天说是“为男人生孩子”；明明买了夫妻独立居住的房子，偏偏说婚后要服伺公婆；明明结婚用的是以嫁人的仪式，有了孩子却还要去争男人的姓；明明婆婆在帮带孩子做家务，却整天说自己带孩子有多辛苦”" />
    <title>至8u</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        padding: 20px;
      }
      ::-webkit-scrollbar {
        display: none;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 10px;
      }
      img {
        width: 100%;
        border-radius: 7px;
      }
      #popup {
        width: 240px;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #ffffff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        max-width: 80%;
        font-family: serif;
        font-weight: 700;
      }
      #close {
        width: 80px;
        height: 30px;
        margin-top: 20px;
        margin-left: auto;
        background-color: #ff4b4b;
        color: #ffffff;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background-color 0.3s;
      }
      #close:hover {
        background-color: #00f;
      }
    </style>
  </head>
  <body>
    <div id="popup" translate="no">
      <div>欢迎yaoyi同学！</div>
      <button id="close">关闭</button>
    </div>
    <script>
      window.onload = function () {
        var popup = document.getElementById("popup");
        var closeBtn = document.getElementById("close");
        closeBtn.onclick = function () {
          popup.style.display = "none";
        };
        popup.style.display = "block";
      };
    </script>

    <div class="container">
      <div class="box"><img src="./a/a1.jpg" alt="" /></div>
      <div class="box"><img src="./a/a2.jpg" alt="" /></div>
      <div class="box"><img src="./a/a3.jpg" alt="" /></div>
      <div class="box"><img src="./a/a4.jpg" alt="" /></div>
      <div class="box"><img src="./a/a5.jpg" alt="" /></div>
    </div>
  </body>
</html>
