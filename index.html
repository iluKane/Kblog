<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/index.css"/>
    <title>Kblog</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="headText">
          <img src="img/kblog.svg" alt="" class="logo" />
          <p class="text textIndent">
            欢迎莅临
            <span class="strongText">KaneのKblog</span>
            ，简称
            <span class="strongText">Kblog</span>
            ，网址为
            <span class="strongText">ilukane.top</span>
            。这是一个由前端领域热爱者精心构建的知识分享殿堂。
          </p>
          <p class="text textIndent">
            本站将不定期发布前端技术相关的文章，欢迎关注本站，共同分享前端学习的快乐。
          </p>
          <p class="text">
            让我们一起，在这个知识的海洋中扬帆起航，共同探索前端技术的无尽魅力。
          </p>
        </div>
        <div class="headLink">
          <div class="avatar">
            <img src="img/avatar.jpg" alt="" />
          </div>
          <div class="links">
            <div class="linkItem">
              <div id="link1">
                <img src="img/link.svg" alt="" />
                <div class="link">友链</div>
              </div>
              <div id="link2">
                <img src="img/website.svg" alt="" />
                <div class="link">收藏的网站</div>
              </div>
            </div>
            <div class="linkElement" id="linkElement"></div>
            <div class="linkControl">
              <div class="linkControlBack" id="linkControlBack">
                <div class="linkControlBackHoverBox">
                  <img class="linkControlImage" src="img/wheel.svg" alt="" />
                </div>
              </div>
              <div class="linkControlPage">
                <div class="linkControlPageTextMask">
                  <div class="linkControlPageText" id="linkControlPageText">
                    游戏联机云服务器,多人畅玩火力全开,低至26.52元/月
                  </div>
                </div>
              </div>
              <div class="linkControlNext" id="linkControlNext">
                <div class="linkControlNextHoverBox">
                  <img class="linkControlImage" src="img/wheel.svg" alt="" />
                </div>
              </div>
              <div class="linkControlMore">More</div>
            </div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="sectionItem" id="sectionItem1">
          <div class="sectionItemTitle">笔记</div>
        </div>
        <div class="sectionItem" id="sectionItem2">
          <div class="sectionItemTitle">成品</div>
        </div>
        <div class="sectionItem" id="sectionItem3">
          <div class="sectionItemTitle">组件</div>
        </div>
        <div class="sectionItem" id="sectionItem4">
          <div class="sectionItemTitle">我的空间</div>
        </div>
      </div>
      <div class="example">
        <div class="exampleItem"></div>
        <div class="exampleItem"></div>
      </div>
      <footer>
        <div>
          <span class="remind">正在更新中</span>
        </div>
        <div id="elapsedTime"></div>
        <div>
          <span class="copyright">
            Copyright © 2024 Kane. All rights reserved.
          </span>
        </div>
      </footer>
    </div>
    <script src="js/index.js"></script>
  </body>
</html>
